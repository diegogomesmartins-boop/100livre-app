# .github/workflows/robo-heartbeat.yml
# Vigia do robo-inter.
# Motivo: o agendador do GH Actions as vezes descarta a execucao agendada. Quando isso
# acontece nao existe run pra falhar, entao ninguem fica sabendo -- o robo simplesmente
# nao rodou e o silencio parece sucesso. Este workflow conta as execucoes bem-sucedidas
# das ultimas 24h e FALHA se faltou alguma. A falha aqui E o alerta: o GitHub dispara
# e-mail automatico pro dono do cron.
name: robo-heartbeat

on:
  schedule:
    - cron: "13 1 * * *"   # 22:13 BRT -- roda depois da janela das 18:00 e fecha o dia
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Contar execucoes do robo-inter nas ultimas 24h
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          DESDE=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          echo "Janela avaliada: desde $DESDE (UTC)"

          gh run list \
            --repo "${{ github.repository }}" \
            --workflow robo-inter.yml \
            --limit 50 \
            --json conclusion,event,createdAt > runs.json

          OK=$(jq --arg d "$DESDE" '[.[] | select(.createdAt >= $d and .conclusion == "success")] | length' runs.json)
          FALHOU=$(jq --arg d "$DESDE" '[.[] | select(.createdAt >= $d and .conclusion == "failure")] | length' runs.json)

          echo "--- execucoes na janela ---"
          jq -r --arg d "$DESDE" '.[] | select(.createdAt >= $d) | "  \(.createdAt)  \(.event)  \(.conclusion)"' runs.json
          echo "---------------------------"
          echo "sucesso: $OK | falha: $FALHOU"

          if [ "$OK" -lt 3 ]; then
            echo "::error::robo-inter teve apenas $OK execucao(oes) bem-sucedida(s) nas ultimas 24h; esperado 3 (06/12/18 BRT). Ou o agendador engoliu uma janela, ou o robo quebrou. Confira o extrato do Inter/Itau no OMIE antes de confiar no painel."
            exit 1
          fi

          echo "OK: as 3 janelas do dia rodaram."
