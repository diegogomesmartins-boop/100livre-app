name: Daily refresh (cache-bust + redeploy)

# Roda todo dia (06h e 20h BRT) e forca um novo deploy do GitHub Pages,
# trocando o "build-stamp" do HTML. Isso muda o conteudo do arquivo,
# entao o navegador/CDN e obrigado a baixar a versao nova (cache invalidado).

on:
  # 06:00 e 20:00 (horario de Brasilia) = 09:00 e 23:00 UTC, todos os dias
  schedule:
    - cron: '0 9,23 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Atualizar build-stamp
        run: |
          FILE="dashboard-100livre.html"
          STAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          if grep -q 'name="build-stamp"' "$FILE"; then
            sed -i "s|<meta name=\"build-stamp\" content=\"[^\"]*\">|<meta name=\"build-stamp\" content=\"$STAMP\">|" "$FILE"
          else
            sed -i "s|</title>|</title>\n<meta name=\"build-stamp\" content=\"$STAMP\">|" "$FILE"
          fi
          echo "build-stamp = $STAMP"

      - name: Verificar sintaxe JS (node --check)
        run: |
          FILE="dashboard-100livre.html"
          python3 - "$FILE" <<'PYEOF'
import sys, re, tempfile, subprocess, os

path = sys.argv[1]
html = open(path, encoding='utf-8').read()

# Extrai todos os <script type="module"> (ignora importmap que é JSON)
scripts = re.findall(r'<script\s+type=["\']module["\'][^>]*>(.*?)</script>', html, re.DOTALL)
if not scripts:
    print("AVISO: nenhum <script type=module> encontrado")
    sys.exit(0)

errors = []
for i, src in enumerate(scripts):
    with tempfile.NamedTemporaryFile(suffix='.js', mode='w', encoding='utf-8', delete=False) as f:
        f.write(src)
        fname = f.name
    try:
        r = subprocess.run(['node', '--check', fname], capture_output=True, text=True)
        if r.returncode != 0:
            errors.append(f'Script {i+1}: {r.stderr.strip()}')
        else:
            print(f'Script {i+1}: OK')
    finally:
        os.unlink(fname)

if errors:
    print('\n=== ERROS DE SINTAXE ===')
    for e in errors:
        print(e)
    sys.exit(1)
PYEOF

      - name: Commit e push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard-100livre.html
          git commit -m "chore: cache-bust diario $(date -u +%F)" || echo "sem mudancas"
          git push
