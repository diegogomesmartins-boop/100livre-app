# .github/workflows/robo-inter.yml
# Robô Inter — roda todo dia e atualiza baixas + painel de cobrança no Firestore.
name: robo-inter

on:
  schedule:
    - cron: "0 9 * * *"      # 09:00 UTC = 06:00 BRT, todo dia
  workflow_dispatch:          # botão para rodar manualmente
    inputs:
      dry_run:
        description: "1 = simula (não baixa) | 0 = baixa de verdade"
        default: "1"

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install firebase-admin
      - name: Rodar robô
        env:
          OMIE_APP_KEY:            ${{ secrets.OMIE_APP_KEY }}
          OMIE_APP_SECRET:         ${{ secrets.OMIE_APP_SECRET }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          INTER_CC: "1972977169"
          # começa em modo simulação; troca p/ "0" quando validado (ou via workflow_dispatch)
          DRY_RUN: ${{ github.event.inputs.dry_run || '1' }}
        run: python robo_inter.py
